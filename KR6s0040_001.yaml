body:
  text: 復持勝善次用莊嚴當今大唐聖主伏願聖壽剋昌皇金輪與沈輪齊轉舜日與佛日高視百王長新萬劫皇大子潛星少海澄闌盤石增高惟城作鎮故持勝善次用莊嚴今六和尚伏願長承帝澤為灌頂之國師永鎮台階贊明王之治化次持勝善次用莊嚴都僧統和尚伏願智山峯崇聳德海洪深命等松筠福慶遐遠即使長承國寵永扇慈風嘉聲溢於中雅範流於像季次持勝善次用莊嚴尚書貴體伏願福山永固神壽無疆功業高於雲山德量深於巨海出持旌節以靜萬方入坐朝堂百寮取則來逢元日恆保春命等松筠壽同劫石又持勝福次用莊嚴大夫伏願形同大地歷千載所恆安福比山河跨萬齡而永固然後振芳聲於帝里翔翼雲衢流雅譽於鸞池濯鱗漢水又持勝善次用莊嚴安姚二侍御伏願聳瓊臺於天外飛紫蓋於雲衢命與天長福將地遠保離區動止獲安嚮震八方往還清吉次持勝善次用莊嚴尚書姟子紹千秋之寵恆居萬代之榮忠孝雙全朱門繼襲次持勝善次用莊嚴釋門教授等伏願榮貴轉新香名霞布入信帝坐出統僧拳群生因類次升高苦海恆施於寶筏次持勝善次用莊嚴釋門法律等惟願色力增固壽命霞延常為苦海之津梁鎮作法門之牆塹次持勝福次用莊嚴都督公等壽遐遠日往月來福慶相暉天長地久次持勝福次用莊嚴都部落使等惟願福祿唯承歡誤日新榮名𠟋昌美譽霞備城隍尞彩盡亦盡忠部落官尞為唯清唯直次持勝福次用莊嚴尊宿大德等長垂像訓匡護法城永耀慈燈紀綱梵宇次持勝善次用莊嚴諸法將大德等唯願智山岌立德水澄清禪枝茂而覺花敫戒香熏而惠珠朗次持勝福次用莊嚴諸尼大德等唯願四依恆滿六度專精意樹恆春心燈永耀八功德水去垢除災七淨妙花莊嚴法體次持勝福次用莊嚴卿官父杖等惟願壽同松柏福比江湖萬歲千秋莫風莫變次持勝福次用莊嚴諸父杖等唯願一聞千悟得大總持罪垢不日而消除功德善芽而增長亦願春秋納慶寒暑順宜保富貴於千齡演休祥於纍劫次持勝福次用莊嚴李和尚等但某乙久蒙示訓虛接鼎堂恨生前不盡指揮沒後慚升法座以此思忖倍益開讚之物奉申回向一唯願神遊奈苑欽覺以尋真夕殷花臺染戒香而奉聖金輪展轉常馳歡喜之園室茂斯遊逈泛功德水次持勝福次莊嚴某乙過父母所生魂路伏願足步金神遊界過慈舟於定水永竭昏河揮惠劍於相材長被受於親族成潔遠枝羅俱霑潤益
